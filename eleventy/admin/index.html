<body>
  <!--
    Sveltia CMS admin panel for Dali Sound.

    SETUP:
    1. Push this folder to a GitHub repo
    2. Open admin/config.yml and replace GITHUB_USERNAME/REPO_NAME
    3. Deploy to Netlify, Vercel, or Cloudflare Pages
    4. Enable GitHub OAuth (Netlify: Settings → Identity → Enable Git Gateway)
    5. Visit yoursite.com/admin — log in with GitHub
    6. Add equipment items — they are saved as .md files in content/equipment/
    7. Eleventy rebuilds the site automatically on each commit
  -->
  <script src="https://unpkg.com/sveltia-cms@latest/dist/sveltia-cms.js"></script>
</body>
